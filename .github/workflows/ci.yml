name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

# Split-CI coverage policy (mirroring the go-asmgen / go-fft orgs).
#
# A single `go test -coverpkg` run cannot reach 100% statement coverage over a
# SIMD-dispatched package: each arch compiles exactly one sumSIMD wrapper — the
# amd64 SSE2 wrapper (reduce_amd64.go -> sum_amd64.s), the arm64 NEON wrapper
# (reduce_arm64.go -> sum_arm64.s), or the scalar-alias wrapper
# (reduce_generic.go, on loong64/ppc64le/riscv64/s390x). No single build sees
# more than one, so no single run covers them all.
#
# The honest split:
#   * The pure-Go scalar CORE plus the multicore kernels (parallel.go) are held
#     to 100% statement coverage by the `test` gate. It runs on the amd64 hosts
#     (ubuntu/windows) AND the arm64 host (macos); on each, exactly one sumSIMD
#     wrapper compiles and IS exercised by TestSumSIMD, so the gate legitimately
#     reaches 100% on every OS — nothing reachable is excluded.
#   * The generated Plan 9 assembly carries no Go statements, so it cannot be
#     statement-covered. It is validated by the per-arch execution jobs
#     (arch-native / arch-qemu): each regenerates the committed .s with
#     go-asmgen and fails if it is stale, vets it (asmdecl cross-checks every
#     name+offset(FP)), builds it (cmd/asm encodes the mnemonics), and RUNS the
#     suite — TestSumSIMD asserts the SIMD sum matches the scalar oracle to a
#     tight relative tolerance (the lane-parallel grouping is a valid reordering,
#     exactly the trade-off numpy's pairwise summation makes; bit-identity is
#     not claimed for a reduction).
#
# So every line is either statement-covered by the gate or executed by a
# per-arch job; the gate is never lowered and there is no coverage-gaming knob.
# amd64/arm64 ship a SIMD sum kernel; the other four keep the validated scalar
# path (Go's loong64/ppc64le assemblers expose no vector double arithmetic, and
# riscv64's V extension is optional) and the multicore path still beats
# single-threaded numpy on large arrays.
jobs:
  test:
    name: test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v6
        with:
          go-version: stable
      - run: go version
      - run: go vet ./...
      - run: go build ./...
      - name: Test + 100% coverage gate
        shell: bash
        run: |
          COVERPKG=$(go list ./... | paste -sd, -)
          go test -race -coverpkg="$COVERPKG" -coverprofile=cover.out ./...
          go tool cover -func=cover.out | tail -n 40
          cov=$(go tool cover -func=cover.out | tail -1 | awk '{print $3}' | tr -d '%')
          echo "coverage: ${cov}%"
          awk -v t="$cov" 'BEGIN { exit !(t+0 >= 100.0) }' || {
            echo "::error::coverage ${cov}% < 100%"; exit 1; }

  # Native per-arch execution. amd64/arm64 have GitHub-hosted runners, so the
  # generated assembly runs natively. Each regenerates the committed .s via
  # go-asmgen and fails if it is stale, then vets/builds/runs the suite —
  # TestSumSIMD asserts SIMD sum == scalar oracle (to tolerance).
  arch-native:
    name: arch ${{ matrix.label }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - { os: ubuntu-latest,    label: amd64, regen: amd64 }
          - { os: ubuntu-24.04-arm, label: arm64, regen: arm64 }
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v6
        with:
          go-version: stable
      - run: go env GOARCH
      - name: Regenerate committed assembly and check it is current
        run: |
          ( cd internal/kernels/asmgen/${{ matrix.regen }} && GOFLAGS=-mod=mod go run gen.go )
          mv internal/kernels/asmgen/${{ matrix.regen }}/sum_${{ matrix.regen }}.s \
             internal/kernels/sum_${{ matrix.regen }}.s
          git diff --exit-code -- internal/kernels/sum_${{ matrix.regen }}.s || {
            echo "::error::generated ${{ matrix.regen }} assembly is stale; run go generate and commit"; exit 1; }
      - name: Vet (asmdecl) + build + run (SIMD == scalar)
        run: |
          go vet ./...
          go build ./...
          go test ./...

  # qemu-user execution for the four targets without a hosted runner. They keep
  # the validated scalar reduction path (no vector-double SIMD kernel shipped),
  # so for them this job is the endianness/word-size guard plus the
  # TestSumSIMD scalar-alias check; the amd64 SSE2 kernel is additionally
  # cross-validated here under qemu-x86_64.
  arch-qemu:
    name: arch ${{ matrix.goarch }} (qemu)
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - { goarch: riscv64, qemu: qemu-riscv64-static }
          - { goarch: loong64, qemu: qemu-loongarch64-static }
          - { goarch: ppc64le, qemu: qemu-ppc64le-static }
          - { goarch: s390x,   qemu: qemu-s390x-static }
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v6
        with:
          go-version: stable
      - run: sudo apt-get update && sudo apt-get install -y qemu-user-static
      - name: Vet + test under qemu (${{ matrix.goarch }})
        run: |
          GOOS=linux GOARCH=${{ matrix.goarch }} go vet ./...
          GOARCH=${{ matrix.goarch }} go test -exec=${{ matrix.qemu }} ./...
